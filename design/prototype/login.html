<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PetalLink - 华为云盘客户端开源版 — 登录</title>
  <!--
    设计系统：TDesign Enterprise · macOS 工具类应用规范
    主色：#0052D9 | 字体栈：-apple-system, SF Pro Text, PingFang SC
    原型类型：登录页（Login Page）
    构建：prototype-builder (筑原型) → 主理人修正
  -->
  <style>
    /* ============================================================
       设计令牌
       ============================================================ */
    :root {
      --color-brand: #0052D9;
      --color-brand-hover: #366EF4;
      --color-brand-active: #003CAB;
      --color-brand-light: #D9E1FF;
      --color-brand-lighter: #F2F3FF;

      --color-success: #2BA471;
      --color-success-bg: #E3F9E9;
      --color-warning: #E37318;
      --color-warning-bg: #FFF1E9;
      --color-error: #D54941;
      --color-error-bg: #FFF0ED;

      --gray-1: #F3F3F3;
      --gray-2: #EEEEEE;
      --gray-3: #E8E8E8;
      --gray-4: #DDDDDD;
      --gray-5: #C6C6C6;
      --gray-6: #A6A6A6;
      --gray-7: #8B8B8B;
      --gray-8: #777777;
      --gray-9: #5E5E5E;
      --gray-10: #4B4B4B;
      --gray-11: #393939;
      --gray-12: #2C2C2C;
      --gray-13: #242424;
      --gray-14: #181818;

      --bg-page: #F5F5F5;
      --bg-container: #FFFFFF;
      --bg-hover: #F3F3F3;
      --bg-active: #E8E8E8;
      --border: #DDDDDD;
      --border-hover: #C6C6C6;
      --text-primary: rgba(0,0,0,0.9);
      --text-secondary: rgba(0,0,0,0.6);
      --text-placeholder: rgba(0,0,0,0.35);

      --font-display: 36px;
      --font-title-lg: 24px;
      --font-title-md: 20px;
      --font-title-sm: 16px;
      --font-body: 14px;
      --font-body-sm: 13px;
      --font-caption: 12px;

      --fw-regular: 400;
      --fw-medium: 500;
      --fw-semibold: 600;

      --radius-sm: 3px;
      --radius-md: 6px;
      --radius-lg: 9px;

      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 12px;
      --space-lg: 16px;
      --space-xl: 24px;
      --space-xxl: 32px;

      --shadow-card: 0 1px 4px rgba(0,0,0,0.08), 0 0 0 0.5px rgba(0,0,0,0.06);
      --shadow-dropdown: 0 4px 12px rgba(0,0,0,0.12), 0 0 0 0.5px rgba(0,0,0,0.06);
      --shadow-modal: 0 8px 24px rgba(0,0,0,0.16);

      --font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Helvetica Neue", sans-serif;
    }

    /* ============================================================
       重置 & 基础
       ============================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      font-family: var(--font-family);
      font-size: var(--font-body);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      background: #5A5A5A;
    }

    /* ============================================================
       macOS 窗口（与其他页面完全一致）
       ============================================================ */
    .macos-window {
      width: 1280px;
      height: 800px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 0 0 0.5px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      margin: 0 auto;
    }

    /* 标题栏 */
    .macos-titlebar {
      height: 38px;
      background: #EBEBEB;
      border-bottom: 0.5px solid #D0D0D0;
      display: flex;
      align-items: center;
      padding: 0 var(--space-md);
      gap: 8px;
      flex-shrink: 0;
    }

    .macos-dots {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .macos-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      position: relative;
    }
    .macos-dot::after {
      content: '';
      position: absolute;
      inset: 0.5px;
      border-radius: 50%;
      border: 0.5px solid rgba(0,0,0,0.12);
    }
    .macos-dot.close { background: #FF5F57; }
    .macos-dot.minimize { background: #FFBD2E; }
    .macos-dot.maximize { background: #28C840; }

    .macos-title {
      flex: 1;
      text-align: center;
      font-size: var(--font-caption);
      font-weight: var(--fw-semibold);
      color: var(--text-secondary);
      letter-spacing: 0.01em;
    }

    .titlebar-spacer { width: 52px; }

    /* ============================================================
       登录主体
       ============================================================ */
    .login-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-xxl) var(--space-lg);
      background: linear-gradient(135deg, #EBF1FF 0%, #F5F5F5 50%, #FFFFFF 100%);
      position: relative;
      overflow: hidden;
    }

    /* 背景装饰 */
    .bg-decoration {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .bg-circle {
      position: absolute;
      border-radius: 50%;
      opacity: 0.06;
      background: var(--color-brand);
    }
    .bg-circle.c1 { width: 400px; height: 400px; top: -100px; right: -80px; }
    .bg-circle.c2 { width: 300px; height: 300px; bottom: -60px; left: -80px; }
    .bg-circle.c3 { width: 200px; height: 200px; top: 50%; left: 30%; opacity: 0.04; }

    .login-card {
      position: relative;
      z-index: 1;
    }

    /* 登录卡片 */
    .login-card {
      width: 100%;
      max-width: 480px;
      background: var(--bg-container);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-modal), 0 0 0 0.5px rgba(0,0,0,0.06);
      overflow: hidden;
    }

    /* 卡片内容区 */
    .card-content {
      padding: var(--space-xxl) var(--space-xl);
      padding-bottom: calc(var(--space-xxl) * 1.5);
    }

    /* 品牌区 */
    .brand-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-md);
      margin-bottom: var(--space-xl);
    }

    .brand-icon {
      width: 64px;
      height: 64px;
      background: var(--color-brand-lighter);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0, 82, 217, 0.16);
    }

    .brand-name {
      font-size: var(--font-title-md);
      font-weight: var(--fw-semibold);
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    /* 蓝色装饰分隔线 */
    .brand-divider {
      width: 40px;
      height: 2px;
      background: var(--color-brand);
      border-radius: 1px;
      margin: var(--space-xs) auto 0;
    }

    /* 操作区 */
    .action-section {
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
    }

    /* 主按钮 */
    .btn-primary {
      background: var(--color-brand);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 0 var(--space-lg);
      height: 40px;
      font-size: var(--font-body);
      font-weight: var(--fw-medium);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-xs);
      transition: background 0.15s, transform 0.1s;
      width: 100%;
      font-family: var(--font-family);
      letter-spacing: 0.01em;
    }
    .btn-primary:hover { background: var(--color-brand-hover); }
    .btn-primary:active { background: var(--color-brand-active); transform: scale(0.99); }

    /* 云朵 SVG 图标 */
    .cloud-svg {
      width: 36px;
      height: 36px;
    }

    /* === SVG 图标系统 === */
    .icon {
      display: inline-block;
      width: 16px;
      height: 16px;
      vertical-align: middle;
      flex-shrink: 0;
    }
    .icon.icon-spin {
      animation: icon-spin 1s linear infinite;
    }
    @keyframes icon-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @media (prefers-reduced-motion: reduce) {
      .icon.icon-spin,
      .spin-icon,
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
<symbol id="i-cloud" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 19a4.5 4.5 0 0 0 0-9 6 6 0 0 0-11.5 1.5A4 4 0 0 0 6 19h11.5z"/></symbol>
</svg>
  <div class="macos-window">

    <!-- macOS 标题栏 -->
    <div class="macos-titlebar">
      <div class="macos-dots">
        <div class="macos-dot close"></div>
        <div class="macos-dot minimize"></div>
        <div class="macos-dot maximize"></div>
      </div>
      <div class="macos-title">PetalLink - 华为云盘客户端开源版</div>
      <div class="titlebar-spacer"></div>
    </div>

    <!-- 登录主体 -->
    <main class="login-body">

      <!-- 背景装饰 -->
      <div class="bg-decoration" aria-hidden="true">
        <div class="bg-circle c1"></div>
        <div class="bg-circle c2"></div>
        <div class="bg-circle c3"></div>
      </div>

      <!-- 登录卡片 -->
      <div class="login-card">

        <!-- 卡片主内容 -->
        <div class="card-content">

          <!-- 品牌区 -->
          <div class="brand-section">
            <div class="brand-icon">
              <!-- 云朵 SVG 图标 -->
              <svg class="cloud-svg" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M10.5 24C7.46243 24 5 21.5376 5 18.5C5 15.7789 6.97405 13.5162 9.5858 13.0756C9.54078 12.7219 9.5 12.3629 9.5 12C9.5 8.41015 12.4101 5.5 16 5.5C18.6825 5.5 20.999 7.0517 22.125 9.29578C22.5735 9.10461 23.0747 9 23.6 9C25.8195 9 27.5 10.7909 27.5 13C27.5 13.1547 27.4917 13.3075 27.4756 13.458C28.3952 13.8716 29.1832 14.5502 29.7247 15.4148C30.2662 16.2795 30.5 17.2915 30.5 18.5C30.5 21.5376 28.0376 24 25 24H10.5Z" fill="#0052D9" fill-opacity="0.15"/>
                <path d="M10.5 23.25C7.87665 23.25 5.75 21.1234 5.75 18.5C5.75 16.1243 7.45264 14.1431 9.71753 13.7992L10.286 13.7113L10.2517 13.1388C10.2174 12.5704 10.25 12.3 10.25 12C10.25 8.82436 12.8244 6.25 16 6.25C18.3763 6.25 20.4328 7.6418 21.4333 9.66791L21.6867 10.178L22.2094 9.98249C22.6532 9.82027 23.1144 9.75 23.6 9.75C25.4022 9.75 26.75 11.1566 26.75 13C26.75 13.1338 26.7427 13.266 26.7282 13.3963L26.6608 14.0028L27.2382 14.2248C28.0472 14.5456 28.7346 15.1089 29.2093 15.8499C29.6841 16.5908 29.9091 17.4808 29.75 18.5C29.75 21.1234 27.6234 23.25 25 23.25H10.5Z" stroke="#0052D9" stroke-width="0.5" stroke-opacity="0.4"/>
                <path d="M15.5 27L18 24M18 24L20.5 27M18 24V30" stroke="#0052D9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div>
              <div class="brand-name">PetalLink - 华为云盘客户端开源版</div>
            </div>
            <div class="brand-divider"></div>
          </div>

          <!-- 操作区 -->
          <div class="action-section">
            <button class="btn-primary" type="button">
              <svg class="icon"><use href="#i-cloud"/></svg>
              <span>使用华为账号登录</span>
            </button>
          </div>

        </div>

      </div>

    </main>
  </div>
</body>
</html>
