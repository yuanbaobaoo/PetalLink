# PetalLink Release Workflow
# 当推送 v* 标签时自动构建 macOS (aarch64) 并发布 GitHub Release。
# 产物包括 .dmg（手动安装）和 .app.tar.gz（自动更新），以及 update.json。

name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release (macOS aarch64)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend deps
        run: |
          cd app
          npm ci

      - name: Build Tauri app
        run: |
          app/node_modules/.bin/tauri build --target aarch64-apple-darwin
        env:
          HWCLOUD_CLIENT_ID: ${{ secrets.HWCLOUD_CLIENT_ID || '' }}
          HWCLOUD_CLIENT_SECRET: ${{ secrets.HWCLOUD_CLIENT_SECRET || '' }}
          # Tauri 更新签名私钥（构建时自动对 .app.tar.gz 签名，生成 .sig）
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Collect and rename artifacts
        run: |
          mkdir -p dist
          cp target/aarch64-apple-darwin/release/bundle/dmg/*.dmg dist/ 2>/dev/null || true

          # 拷贝 Tauri 自动生成的更新产物（createUpdaterArtifacts: true + 签名私钥）
          # 含 .app.tar.gz（更新包）和 .app.tar.gz.sig（签名）
          BUNDLE_MACOS="target/aarch64-apple-darwin/release/bundle/macos"
          cp "$BUNDLE_MACOS"/*.app.tar.gz dist/ 2>/dev/null || true
          cp "$BUNDLE_MACOS"/*.app.tar.gz.sig dist/ 2>/dev/null || true

          # 校验签名文件确实生成（缺失说明 TAURI_SIGNING_PRIVATE_KEY 未配置或为空）
          if ! ls dist/*.app.tar.gz.sig 1>/dev/null 2>&1; then
            echo "::error::未找到 .app.tar.gz.sig —— 请检查 GitHub Secret TAURI_SIGNING_PRIVATE_KEY 是否已配置"
            exit 1
          fi

          # 重命名加架构后缀（.sig 跟随同名 .app.tar.gz）
          for f in dist/*.dmg; do
            base=$(basename "$f" .dmg)
            mv "$f" "dist/${base}_aarch64.dmg"
          done 2>/dev/null || true
          for f in dist/*.app.tar.gz; do
            base=$(basename "$f" .app.tar.gz)
            mv "$f" "dist/${base}_aarch64.app.tar.gz"
          done 2>/dev/null || true
          for f in dist/*.app.tar.gz.sig; do
            base=$(basename "$f" .app.tar.gz.sig)
            mv "$f" "dist/${base}_aarch64.app.tar.gz.sig"
          done 2>/dev/null || true

      - name: Generate update.json
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "Tag: $TAG, Version: $VERSION"

          TAR_FILE=$(ls dist/*_aarch64.app.tar.gz 2>/dev/null | head -1)
          TAR_NAME=$(basename "$TAR_FILE" 2>/dev/null || echo "")

          # 读取 Tauri 生成的签名内容（minisign 格式，多行）
          SIG_FILE=$(ls dist/*_aarch64.app.tar.gz.sig 2>/dev/null | head -1)
          SIGNATURE=$(cat "$SIG_FILE" 2>/dev/null || echo "")

          # workflow_dispatch 手动触发时无 tag，version 兜底
          if [ -z "$VERSION" ] || [ "$VERSION" = "$GITHUB_REF" ]; then
            VERSION="0.0.0-manual"
          fi

          # 用 jq 构造 JSON：signature 是多行 minisign 内容，必须经 jq 转义为 \n
          # 否则裸换行会破坏 JSON 结构（常见 Tauri update.json 失效坑）
          URL="https://github.com/yuanbaobaoo/PetalLink/releases/download/$TAG/$TAR_NAME"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          NOTES="详见 https://github.com/yuanbaobaoo/PetalLink/releases/tag/$TAG"

          jq -n \
            --arg version "$VERSION" \
            --arg notes "$NOTES" \
            --arg pub_date "$PUB_DATE" \
            --arg signature "$SIGNATURE" \
            --arg url "$URL" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": {
                  signature: $signature,
                  url: $url
                }
              }
            }' > dist/PetalLink_update.json

          echo "Generated PetalLink_update.json:"
          cat dist/PetalLink_update.json
          echo ""
          # 校验生成的 JSON 合法（signature 转义后应为单行 \n）
          jq empty dist/PetalLink_update.json && echo "✅ update.json JSON 合法"

      - name: List dist
        run: ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }}"
          # generate_release_notes: true 会自动生成「自上个 tag 以来的 commits/PR 变更说明」，
          # 并接在下方自定义 body 之后（action-gh-release 的 pre-pend 语义）。
          generate_release_notes: true
          body: |
            ## 更新内容

            ${{ github.event.head_commit.message }}

            ---

            ## 安装说明

            macOS 安全策略会拦截从互联网下载的未签名应用，双击 DMG 时可能提示「磁盘映像损坏」。请先移除隔离标记再打开：

            ```bash
            xattr -d com.apple.quarantine ~/Downloads/PetalLink_*_aarch64.dmg
            ```
            或者
            ```
            xattr -d com.apple.quarantine /Applications/PetalLink.app
            ```

          files: |
            dist/*.dmg
            dist/*.app.tar.gz
            dist/*.app.tar.gz.sig
            dist/PetalLink_update.json
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
